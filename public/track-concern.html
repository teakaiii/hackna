<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Concern — ConcernTracker PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 2rem 1rem; }
        .card-main { max-width: 640px; margin: 0 auto; border: none; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,.08); overflow: hidden; }
        .head { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 2rem; }
        .status-pill { display: inline-block; padding: .35rem .85rem; border-radius: 999px; font-size: .8rem; font-weight: 600; text-transform: capitalize; }
        .status-submitted { background: #dbeafe; color: #1d4ed8; }
        .status-under_review, .status-in_progress { background: #fef3c7; color: #b45309; }
        .status-responded { background: #e0e7ff; color: #4338ca; }
        .status-resolved { background: #d1fae5; color: #047857; }
        .admin-box { background: #f8fafc; border-left: 4px solid #6366f1; padding: 1rem 1.25rem; border-radius: 0 12px 12px 0; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="card card-main">
        <div class="head">
            <h1 class="h4 mb-1"><i class="fas fa-search-location me-2"></i>Concern status</h1>
            <p class="mb-0 opacity-90 small">Tracking ID: <span id="tid">…</span></p>
        </div>
        <div class="card-body p-4">
            <div id="loading" class="text-center py-4 text-muted">
                <i class="fas fa-circle-notch fa-spin fa-2x mb-3"></i>
                <p class="mb-0">Loading…</p>
            </div>
            <div id="error" class="alert alert-danger d-none" role="alert"></div>
            <div id="content" class="d-none">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <h2 class="h5 mb-1" id="title"></h2>
                        <span class="status-pill" id="statusPill"></span>
                    </div>
                    <span class="badge bg-light text-dark border" id="priority"></span>
                </div>
                <p class="text-muted small mb-2"><i class="fas fa-folder me-1"></i><span id="category"></span></p>
                <p class="mb-3" id="description"></p>
                <hr>
                <p class="small text-muted mb-1"><i class="fas fa-clock me-1"></i>Submitted <span id="created"></span></p>
                <p class="small text-muted mb-0"><i class="fas fa-sync me-1"></i>Updated <span id="updated"></span></p>
                <div id="adminSection" class="admin-box d-none">
                    <strong><i class="fas fa-reply me-1"></i>Admin response</strong>
                    <p class="mb-0 mt-2" id="adminText"></p>
                </div>
            </div>
        </div>
        <div class="card-footer bg-white border-0 pt-0 pb-4 px-4">
            <a href="/submit-concern-enhanced.html" class="btn btn-outline-primary btn-sm rounded-pill">Submit another concern</a>
            <a href="/" class="btn btn-link btn-sm">Home</a>
        </div>
    </div>
    <script>
        const trackingId = window.location.pathname.split('/').filter(Boolean).pop() || new URLSearchParams(window.location.search).get('tracking');
        document.getElementById('tid').textContent = trackingId || '(missing)';

        function fmtStatus(s) {
            if (!s) return '';
            return s.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        async function load() {
            if (!trackingId) {
                document.getElementById('loading').classList.add('d-none');
                document.getElementById('error').textContent = 'No tracking ID in URL.';
                document.getElementById('error').classList.remove('d-none');
                return;
            }
            try {
                const r = await fetch('/api/track/' + encodeURIComponent(trackingId));
                if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || 'Not found');
                const c = await r.json();
                document.getElementById('loading').classList.add('d-none');
                document.getElementById('content').classList.remove('d-none');
                document.getElementById('title').textContent = c.title || '—';
                document.getElementById('description').textContent = c.description || '';
                document.getElementById('category').textContent = c.category || '—';
                document.getElementById('priority').textContent = (c.priority || '').toUpperCase() + ' priority';
                const st = (c.status || '').replace(/ /g, '_').toLowerCase();
                const pill = document.getElementById('statusPill');
                pill.textContent = fmtStatus(c.status);
                pill.className = 'status-pill status-' + st;
                document.getElementById('created').textContent = c.createdAt ? new Date(c.createdAt).toLocaleString() : '—';
                document.getElementById('updated').textContent = c.updatedAt ? new Date(c.updatedAt).toLocaleString() : '—';
                if (c.adminResponse) {
                    document.getElementById('adminSection').classList.remove('d-none');
                    document.getElementById('adminText').textContent = c.adminResponse;
                }
            } catch (e) {
                document.getElementById('loading').classList.add('d-none');
                document.getElementById('error').textContent = e.message || 'Could not load concern.';
                document.getElementById('error').classList.remove('d-none');
            }
        }
        load();
    </script>
</body>
</html>
